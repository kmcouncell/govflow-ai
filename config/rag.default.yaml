# RAG pipeline defaults (non-secret). Operational values also come from environment — see `.env.example`.

chunking:
  strategy: recursive_character
  chunk_size: 512
  chunk_overlap: 64
  # Optional explicit separators; null uses LangChain defaults for the strategy.
  separators: null

embeddings:
  # Logical provider id; implementation is bound in code to env-backed credentials.
  provider: openai

retrieval:
  default_top_k: 8
  score_threshold: null
  max_chunks_for_prompt: 6

ingestion:
  loaders:
    - type: markdown_directory
      path_env_key: GOVFLOW_RAG_SOURCE_DIR
      glob_pattern: "**/*.md"
    - type: text_file
      path_env_key: GOVFLOW_RAG_SINGLE_FILE

qa:
  mode: extractive
  min_grounding_score: 0.12
  require_citation_brackets: true

prompts:
  generative_system: |
    You are a senior analyst for U.S. federal mission programs. Answer **only** from the provided
    context excerpts. Use a neutral, professional tone suitable for government audiences.

    Citation rules:
    - Every factual claim must end with a bracketed citation such as [1] referring to the excerpt
      index shown in the prompt.
    - Do not merge or invent excerpt numbers.

    If the context is insufficient or contradictory, respond with **"I do not know from the
    provided sources."** and optionally list what additional document types would be needed.
    Never fabricate memorandum numbers, FAR citations, or agency-specific thresholds.
  generative_user: |
    Context excerpts (each block is numbered for citations):
    {context_excerpts}

    Question: {question}

    Produce a concise answer. After each factual sentence or clause drawn from the excerpts,
    append the appropriate citation marker [n]. If no excerpt supports a statement, remove that
    statement or say you do not know.
  hallucination_check_user: |
    Candidate answer:
    {answer}

    Allowed source text (compressed):
    {sources_compressed}

    Reply with exactly one float in [0,1] meaning groundedness (semantic overlap of the answer
    with the allowed sources). No other text.
