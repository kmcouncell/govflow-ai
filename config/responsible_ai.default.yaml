# Responsible AI, audit, rate limits, and extra HTTP security (no secrets).
# Overlay with responsible_ai.<environment>.yaml

version: 1

rate_limiting:
  enabled: true
  window_seconds: 60
  default_requests_per_window: 300
  ai_route_requests_per_window: 60

http_security:
  content_security_policy: ""
  cross_origin_opener_policy: ""
  cross_origin_resource_policy: ""
  permissions_policy_extra: ""

audit:
  enabled: true
  max_prompt_chars_logged: 256
  max_response_chars_logged: 512

guardrails:
  input_validation:
    enabled: true
    max_request_chars: 100000
    blocked_regex: []
  output_validation:
    enabled: true
    max_output_chars: 200000
    blocked_regex:
      - "(?i)password\\s*[:=]\\s*\\S+"
      - "(?i)api[_-]?key\\s*[:=]\\s*\\S{8,}"
  cui_pii:
    enabled: true
    mode: "redact"
    redact_ssn: true
    redact_email: true
    redact_phone: true
    block_if_cui_markers: false
    cui_marker_substrings:
      - "CUI//"
      - "CONTROLLED UNCLASSIFIED INFORMATION"
  hallucination_detection:
    enabled: true
    min_assistant_chars: 100
    risky_phrases:
      - "guaranteed accurate"
      - "100% certain"
      - "classified above secret"
    block_on_risky_phrase: false
