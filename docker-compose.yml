services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      GOVFLOW_ENV: ${GOVFLOW_ENV:-development}
      GOVFLOW_CONFIG_DIR: ${GOVFLOW_CONFIG_DIR:-/app/config}
      GOVFLOW_SAMPLE_DATA_DIR: ${GOVFLOW_SAMPLE_DATA_DIR:-/app/sample_data}
      GOVFLOW_LOG_DIR: ${GOVFLOW_LOG_DIR:-/app/logs}
      GOVFLOW_BACKEND_HOST: ${GOVFLOW_BACKEND_HOST:-0.0.0.0}
      GOVFLOW_BACKEND_PORT: ${GOVFLOW_BACKEND_PORT:-8000}
      GOVFLOW_BACKEND_CORS_ORIGINS: ${GOVFLOW_BACKEND_CORS_ORIGINS:-http://localhost:5173}
      GOVFLOW_LOG_LEVEL: ${GOVFLOW_LOG_LEVEL:-INFO}
      GOVFLOW_LOG_JSON: ${GOVFLOW_LOG_JSON:-true}
      GOVFLOW_LOG_UVICORN_ACCESS: ${GOVFLOW_LOG_UVICORN_ACCESS:-false}
      GOVFLOW_HTTP_ACCESS_LOG_ENABLED: ${GOVFLOW_HTTP_ACCESS_LOG_ENABLED:-false}
      GOVFLOW_CORRELATION_ID_REQUEST_HEADER: ${GOVFLOW_CORRELATION_ID_REQUEST_HEADER:-X-Correlation-ID}
      GOVFLOW_CORRELATION_ID_RESPONSE_HEADER: ${GOVFLOW_CORRELATION_ID_RESPONSE_HEADER:-X-Correlation-ID}
      GOVFLOW_SECURITY_TRUSTED_HOSTS: ${GOVFLOW_SECURITY_TRUSTED_HOSTS:-}
      GOVFLOW_SECURITY_ENABLE_HSTS: ${GOVFLOW_SECURITY_ENABLE_HSTS:-false}
      GOVFLOW_SECURITY_HSTS_MAX_AGE_SECONDS: ${GOVFLOW_SECURITY_HSTS_MAX_AGE_SECONDS:-0}
      GOVFLOW_SECURITY_ENABLE_FRAME_OPTIONS: ${GOVFLOW_SECURITY_ENABLE_FRAME_OPTIONS:-true}
      GOVFLOW_SECURITY_FRAME_OPTIONS_VALUE: ${GOVFLOW_SECURITY_FRAME_OPTIONS_VALUE:-DENY}
      GOVFLOW_SECURITY_ENABLE_CONTENT_TYPE_OPTIONS: ${GOVFLOW_SECURITY_ENABLE_CONTENT_TYPE_OPTIONS:-true}
      GOVFLOW_SECURITY_REFERRER_POLICY: ${GOVFLOW_SECURITY_REFERRER_POLICY:-strict-origin-when-cross-origin}
      GOVFLOW_SECURITY_PERMISSIONS_POLICY: ${GOVFLOW_SECURITY_PERMISSIONS_POLICY:-}
      GOVFLOW_LANGGRAPH_THREAD_ID_PREFIX: ${GOVFLOW_LANGGRAPH_THREAD_ID_PREFIX:-govflow}
    volumes:
      - ./config:/app/config:ro
      - ./sample_data:/app/sample_data:ro
    ports:
      - "${GOVFLOW_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_GOVFLOW_API_BASE_URL: ${VITE_GOVFLOW_API_BASE_URL:-http://localhost:8000}
        VITE_GOVFLOW_APP_NAME: ${VITE_GOVFLOW_APP_NAME:-GovFlow AI}
        VITE_GOVFLOW_ENV: ${VITE_GOVFLOW_ENV:-production}
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
